# ============================================================
# PostgreSQL 16 — 浅愈(GentleMend) 医疗AI系统优化配置
# 目标环境: Docker容器, 1GB RAM, 1 CPU (开发/演示)
# 生产环境参数在注释中标注 [PROD]
# ============================================================

# --- 连接 ---
listen_addresses = '*'
port = 5432
max_connections = 50                    # [PROD] 200, 配合 pgbouncer
superuser_reserved_connections = 3

# --- 内存 ---
shared_buffers = 256MB                  # 容器内存的 25%, [PROD] 4GB (16GB机器)
work_mem = 8MB                          # 排序/哈希操作, [PROD] 32MB
maintenance_work_mem = 64MB             # VACUUM/CREATE INDEX, [PROD] 512MB
effective_cache_size = 512MB            # OS页缓存估算, [PROD] 12GB
huge_pages = off                        # Docker 中通常关闭, [PROD] try

# --- WAL (审计数据持久性保证) ---
wal_level = replica                     # 支持 PITR + 流复制, [PROD] logical (CDC)
fsync = on                              # 绝不关闭 — 医疗数据零丢失
synchronous_commit = on                 # 每次提交刷盘, 牺牲性能换数据安全
wal_buffers = 16MB                      # WAL 缓冲区
checkpoint_timeout = 10min              # [PROD] 15min
checkpoint_completion_target = 0.9
max_wal_size = 512MB                    # [PROD] 4GB
min_wal_size = 128MB                    # [PROD] 1GB
archive_mode = on                       # 开启 WAL 归档 (PITR 基础)
archive_command = 'test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'
                                        # [PROD] 用 pgBackRest/barman 替代

# --- 查询优化 ---
random_page_cost = 1.1                  # SSD 存储
effective_io_concurrency = 200          # SSD 并发 IO
default_statistics_target = 200         # 更精确的统计信息, [PROD] 500

# --- 并行查询 ---
max_parallel_workers_per_gather = 2     # [PROD] 4
max_parallel_workers = 4                # [PROD] 8
max_parallel_maintenance_workers = 2    # [PROD] 4

# --- 日志 (审计追溯) ---
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 200        # 慢查询阈值 ms, [PROD] 100
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_statement = 'ddl'                   # 记录所有 DDL, [PROD] 'ddl'
log_line_prefix = '%t [%p] %u@%d '

# --- 自动清理 ---
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 30s                # 医疗数据写入频繁, 缩短间隔
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.05   # 5% 行变更触发 VACUUM
autovacuum_analyze_scale_factor = 0.05

# --- 区域设置 ---
timezone = 'Asia/Shanghai'
lc_messages = 'C'
lc_monetary = 'C'
lc_numeric = 'C'
lc_time = 'C'

# --- 扩展预加载 ---
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 5000
pg_stat_statements.track = all
