# ============================================================
# 浅愈(GentleMend) — CI/CD 流水线
# 触发: push to main/develop, PR to main
# 阶段: lint → test → build
# ============================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ============================================================
  # 后端: Lint + Type Check
  # ============================================================
  backend-lint:
    name: "Backend Lint & Type Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Ruff lint
        run: cd backend && python -m ruff check app/ tests/

      - name: Ruff format check
        run: cd backend && python -m ruff format --check app/ tests/

      - name: Mypy type check
        run: cd backend && python -m mypy app/ --ignore-missing-imports

  # ============================================================
  # 后端: 单元测试
  # ============================================================
  backend-test:
    name: "Backend Unit Tests"
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run unit tests
        run: |
          cd backend && python -m pytest tests/ \
            -v --tb=short \
            -m "not integration" \
            --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ============================================================
  # 后端: 集成测试 (需要 PostgreSQL + Redis)
  # ============================================================
  backend-integration:
    name: "Backend Integration Tests"
    runs-on: ubuntu-latest
    needs: backend-lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gentlemend_test
          POSTGRES_USER: gentlemend
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run database migrations
        env:
          DB_HOST: localhost
          DB_NAME: gentlemend_test
          DB_USER: gentlemend
          DB_PASSWORD: test_password
        run: cd backend && python -m alembic upgrade head

      - name: Run integration tests
        env:
          DB_HOST: localhost
          DB_NAME: gentlemend_test
          DB_USER: gentlemend
          DB_PASSWORD: test_password
          REDIS_HOST: localhost
        run: |
          cd backend && python -m pytest tests/ \
            -v --tb=short -m integration

  # ============================================================
  # 前端: Lint + Type Check (与后端并行)
  # ============================================================
  frontend-lint:
    name: "Frontend Lint & Type Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: ESLint
        run: cd frontend && npm run lint

      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

  # ============================================================
  # 前端: 测试
  # ============================================================
  frontend-test:
    name: "Frontend Tests"
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run tests
        run: cd frontend && npm test -- --run --coverage

  # ============================================================
  # Docker 构建 (仅验证构建成功，不推送)
  # ============================================================
  docker-build:
    name: "Docker Build Verification"
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t gentlemend-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t gentlemend-frontend:ci ./frontend

      - name: Verify compose config
        run: docker compose config --quiet
